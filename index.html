
<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Mahatma Phule Krushi Vikas Kendra-महात्मा फुले कृषी विकास केंद्र</title>
    <meta name="description" content="मेघा भरती: प्रत्येक गावात एक 'कृषी मित्र नेमणे आहे! मराठवाडा, विदर्भ आणि खानदेशातील ग्रामीण तरुणांना आपल्याच गावात राहून सन्मानाने काम करण्याची संधी.">
    <meta name="keywords" content="Krushi Mitra, Agriculture, Farming, Mahatma Phule Krushi Vikas Kendra, Jobs in Agriculture, Maharashtra">
    
    <link rel="icon" href="https://i.ibb.co/Pv6GGGT3/logo.png" type="image/png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-green: #27ae60;
            --dark-green: #1e8449;
            --light-green: #2ecc71;
            --light-yellow: #fcf3cf;
            --highlight-gold: #f1c40f;
            --white: #ffffff;
            --text-dark: #2c3e50;
            --text-light: #555555;
            --header-height: 80px;
            --shadow-sm: 0 2px 10px rgba(0,0,0,0.05);
            --shadow-md: 0 5px 20px rgba(0,0,0,0.1);
            --shadow-lg: 0 15px 35px rgba(0,0,0,0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: var(--header-height);
        }

        body {
            font-family: 'Mukta', sans-serif;
            color: var(--text-dark);
            background-color: #f8fdfa;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Header & Navigation --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: var(--header-height);
            background-color: var(--white);
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .logo-container img {
            height: 55px;
            width: 55px;
            object-fit: contain;
            border-radius: 5px;
            transition: transform 0.3s ease;
        }

        .logo-container:hover img {
            transform: scale(1.05);
        }

        .logo-text h1 {
            font-size: 1.3rem;
            color: var(--dark-green);
            font-weight: 700;
            line-height: 1.2;
        }

        .logo-text p {
            font-size: 0.85rem;
            color: var(--text-light);
            line-height: 1.2;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
            margin-left: auto;
            margin-right: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 1.1rem;
            transition: color 0.3s ease;
            position: relative;
            padding: 5px 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: var(--primary-green);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--primary-green);
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .hamburger {
            display: none;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1.8rem;
            color: var(--primary-green);
            transition: transform 0.3s ease;
        }

        /* --- Buttons --- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-green);
            color: var(--white);
            padding: 12px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 2px solid var(--primary-green);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
            text-align: center;
        }

        .btn:hover {
            background-color: var(--dark-green);
            border-color: var(--dark-green);
            transform: translateY(-3px);
            color: var(--white);
            box-shadow: 0 6px 15px rgba(39, 174, 96, 0.4);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--white);
            border-color: var(--white);
        }

        .btn-outline:hover {
            background-color: var(--white);
            color: var(--dark-green);
        }

        /* --- Hero Slider Section --- */
        .hero-slider {
            position: relative;
            height: 100vh;
            margin-top: var(--header-height);
            background-color: var(--dark-green);
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transform: scale(1.05);
            transition: opacity 1.5s ease-in-out, transform 4s ease-in-out;
            z-index: 1;
        }

        .slide.active {
            opacity: 1;
            transform: scale(1);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(10, 40, 20, 0.9) 0%, rgba(10, 40, 20, 0.4) 60%, transparent 100%);
            z-index: 2;
            display: flex;
            align-items: center;
            padding: 0 5%;
        }

        .hero-content {
            max-width: 650px;
            color: var(--white);
            text-align: left;
            animation: slideInLeft 1s ease forwards;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--light-yellow);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            line-height: 1.1;
        }

        .hero-content h2 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .hero-content .eng-text {
            font-size: 1.2rem;
            margin-bottom: 35px;
            opacity: 0.9;
            line-height: 1.5;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
            border-left: 4px solid var(--primary-green);
            padding-left: 15px;
        }

        .hero-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* --- Krushi Mitra Section --- */
        .krushi-mitra {
            padding: 80px 5%;
            background: linear-gradient(135deg, var(--light-yellow) 0%, #fdf6e3 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 50px;
            position: relative;
            overflow: hidden;
        }

        .krushi-mitra::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background-color: rgba(39, 174, 96, 0.1);
            border-radius: 50%;
            z-index: 0;
        }

        .km-text {
            flex: 1;
            max-width: 650px;
            z-index: 1;
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            border-top: 5px solid var(--highlight-gold);
            animation: pulse-highlight 3s infinite alternate;
        }

        @keyframes pulse-highlight {
            0% { box-shadow: 0 5px 20px rgba(241, 196, 15, 0.2); }
            100% { box-shadow: 0 10px 30px rgba(241, 196, 15, 0.5); }
        }

        .km-text h2 {
            font-size: 2.5rem;
            color: var(--dark-green);
            margin-bottom: 25px;
            line-height: 1.2;
        }

        .km-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .km-image {
            flex: 1;
            text-align: right;
            z-index: 1;
        }

        .km-image img {
            width: 100%;
            max-width: 550px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            transition: transform 0.4s ease;
        }

        .km-image img:hover {
            transform: translateY(-10px);
        }

        /* --- Sections General --- */
        section {
            padding: 90px 5%;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            color: var(--dark-green);
            margin-bottom: 60px;
            font-weight: 700;
            position: relative;
        }
        
        .section-title::after {
            content: '';
            width: 80px;
            height: 4px;
            background-color: var(--primary-green);
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
        }

        /* --- New Job Post Section (Minimalist & Professional) --- */
        .job-post-section {
            background-color: #f9fbf9;
            padding: 80px 5%;
        }

        .job-card-minimal {
            background: var(--white);
            border-radius: 12px;
            padding: 0;
            box-shadow: 0 5px 25px rgba(0,0,0,0.06);
            max-width: 850px;
            margin: 0 auto;
            border-top: 5px solid var(--primary-green);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .job-card-minimal:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }

        .job-header-minimal {
            background-color: #f2faf5;
            padding: 30px 40px;
            text-align: center;
            border-bottom: 1px solid #e0eee4;
        }

        .job-header-minimal h3 {
            font-size: 1.4rem;
            color: var(--text-light);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .job-header-minimal h4 {
            font-size: 2rem;
            color: var(--dark-green);
            font-weight: 700;
        }

        .job-body {
            padding: 40px;
        }

        .job-details-grid {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 20px 15px;
            align-items: start;
        }

        .job-label {
            font-weight: 700;
            color: var(--dark-green);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .job-value {
            font-size: 1.1rem;
            color: var(--text-dark);
            line-height: 1.6;
        }

        .job-value a {
            color: var(--primary-green);
            text-decoration: none;
            font-weight: 600;
        }

        .job-value a:hover {
            text-decoration: underline;
        }

        .special-notice {
            background: linear-gradient(to right, #fcf3cf 0%, #fdf9e7 100%);
            border-left: 4px solid var(--highlight-gold);
            padding: 20px;
            margin-top: 35px;
            border-radius: 0 8px 8px 0;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            box-shadow: 0 2px 10px rgba(241, 196, 15, 0.1);
        }

        .special-notice .notice-icon {
            font-size: 2rem;
            line-height: 1;
        }

        .special-notice p {
            margin: 0;
            color: #8a6d3b;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .special-notice strong {
            color: #a07d1c;
            display: block;
            margin-bottom: 5px;
        }

        .job-action {
            text-align: center;
            margin-top: 40px;
        }

        .job-action .btn {
            padding: 15px 45px;
            font-size: 1.25rem;
            border-radius: 50px;
        }

        /* --- Popup Modal Styles --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.show {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: var(--white);
            padding: 35px;
            border-radius: 15px;
            max-width: 650px;
            width: 90%;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border-top: 6px solid #e74c3c;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-light);
            transition: color 0.3s;
            line-height: 1;
        }

        .modal-close:hover {
            color: #e74c3c;
        }

        .modal-text {
            margin-bottom: 20px;
        }

        .modal-text h3 {
            color: #c0392b;
            font-size: 1.6rem;
            margin-bottom: 15px;
        }

        .modal-text p {
            font-size: 1.15rem;
            margin-bottom: 10px;
            color: var(--text-dark);
            line-height: 1.5;
        }

        .modal-divider {
            height: 1px;
            background: #ddd;
            margin: 25px 0;
        }

        /* --- About Section --- */
        .about {
            background-color: var(--white);
            text-align: center;
        }

        .about p {
            max-width: 900px;
            margin: 0 auto 20px auto;
            font-size: 1.25rem;
            color: var(--text-light);
            line-height: 1.8;
        }

        /* --- Impact Statistics Section --- */
        .impact-section {
            background: linear-gradient(rgba(30, 132, 73, 0.9), rgba(39, 174, 96, 0.9)), url('https://i.ibb.co/LD2GHHsv/image001.jpg') center/cover fixed;
            color: var(--white);
            padding: 70px 5%;
            text-align: center;
        }

        .impact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stat-box {
            padding: 20px;
        }

        .stat-box .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .stat-box h3 {
            font-size: 3.5rem;
            color: var(--light-yellow);
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stat-box p {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* --- Services Section --- */
        .services {
            background-color: #f4faf6;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 35px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .service-card {
            background-color: var(--white);
            border-radius: 15px;
            padding: 45px 30px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 0;
            background: linear-gradient(to bottom, var(--primary-green), var(--dark-green));
            transition: height 0.4s ease;
            z-index: -1;
            opacity: 0.05;
        }

        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
        }

        .service-card:hover::before {
            height: 100%;
        }

        .service-icon {
            font-size: 4rem;
            margin-bottom: 25px;
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .service-card:hover .service-icon {
            transform: scale(1.1);
        }

        .service-card h3 {
            font-size: 1.5rem;
            color: var(--dark-green);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .service-card p {
            font-size: 1.1rem;
            color: var(--text-light);
        }

        /* --- Testimonials Section --- */
        .testimonials {
            background-color: var(--white);
        }

        .testimonial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .testimonial-card {
            background: #fdfaf3;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: var(--shadow-sm);
            border-top: 5px solid var(--highlight-gold);
            position: relative;
            transition: transform 0.3s ease;
        }

        .testimonial-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }

        .testimonial-card::before {
            content: '”';
            font-size: 6rem;
            color: rgba(241, 196, 15, 0.2);
            position: absolute;
            top: -10px;
            left: 20px;
            font-family: serif;
            line-height: 1;
        }

        .testimonial-text {
            font-size: 1.15rem;
            color: var(--text-dark);
            font-sty
